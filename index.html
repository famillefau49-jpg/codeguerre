<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transmission du Lynx</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin:0;
    font-family: "Courier New", monospace;
    background: black;
    color: #00ff9c;
    text-align: center;
}

.container {
    max-width: 650px;
    margin: 80px auto;
    padding: 30px;
    border: 2px solid #00ff9c;
    border-radius: 10px;
    background: rgba(0,0,0,0.9);
}

h1 {
    text-transform: uppercase;
}

button {
    display:block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
    background: black;
    color: #00ff9c;
    border: 1px solid #00ff9c;
}

button:hover {
    background: #00ff9c;
    color: black;
}

#message {
    margin-top: 25px;
    font-size: 18px;
    min-height: 100px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Transmission du Lynx</h1>

    <p><b>En 1940, qui est le président de la République française ?</b></p>

    <button onclick="verifier('A')">A. Charles de Gaulle</button>
    <button onclick="verifier('B')">B. Philippe Pétain</button>
    <button onclick="verifier('C')">C. Albert Lebrun</button>
    <button onclick="verifier('D')">D. Georges Clemenceau</button>
    <button onclick="verifier('E')">E. Paul Reynaud</button>
    <button onclick="verifier('F')">F. Léon Blum</button>

    <div id="message"></div>
</div>

<script>

function verifier(reponse) {

    if(reponse === "C") {

        confetti({
            particleCount: 120,
            spread: 80
        });

        document.getElementById("message").innerHTML =
        "<b>✔ Réponse correcte</b><br><br>" +
        "Bravo, vous êtes sur la bonne piste.<br><br>" +
        "Rendez-vous sous le hangar.<br>" +
        "Votre chef de groupe vous attend pour la suite de la mission.<br><br>" +
        "<i>Fin de transmission.</i>";

    } else {

        document.getElementById("message").innerHTML =
        "⛔ Mauvaise réponse. Réfléchissez et recommencez.";

    }
}

</script>

</body>
</html>
